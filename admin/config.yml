backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:

  # ── Cases ──────────────────────────────────────────────────────────────────
  - name: "cases"
    label: "Cases"
    label_singular: "Case"
    folder: "_cases"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Klantnaam",          name: "client",       widget: "string" }
      - { label: "Korte beschrijving", name: "beschrijving", widget: "text" }
      - label: "Type / Tags"
        name: "type"
        widget: "list"
        field: { label: "Label", name: "label", widget: "string" }
        hint: "Gebruik exact dezelfde labels als gedefinieerd in Globaal → Case labels"
      - label: "Cover modus"
        name: "cover_modus"
        widget: "select"
        options: ["afbeelding", "video"]
        default: "afbeelding"
      - label: "Cover bestand"
        name: "cover"
        widget: "file"
        hint: "Aanbevolen: 1200 × 800 px (3:2) — max. 1 MB"
        media_library:
          config:
            multiple: false
      - label: "Hero modus (detailpagina)"
        name: "hero_modus"
        widget: "select"
        options: ["afbeelding", "video"]
        default: "afbeelding"
      - label: "Hero bestand"
        name: "hero"
        widget: "file"
        hint: "Aanbevolen: 1600 × 900 px (16:9) — max. 1 MB"
      - label: "Accordion (dropdown secties)"
        name: "accordion"
        widget: "list"
        hint: "Voeg secties toe of verwijder ze. Volgorde bepaalt de weergave."
        fields:
          - { label: "Titel",   name: "titel",  widget: "string" }
          - { label: "Inhoud",  name: "inhoud", widget: "text" }
      - label: "Team"
        name: "team"
        widget: "list"
        hint: "Iedereen die aan dit project heeft gewerkt."
        fields:
          - { label: "Naam", name: "naam", widget: "string" }
          - { label: "Rol",  name: "rol",  widget: "string" }
      - label: "Galerij rijen"
        name: "galerie"
        widget: "list"
        hint: "Elke rij is óf een volledige breedte-afbeelding óf twee naast elkaar."
        fields:
          - label: "Layout"
            name: "layout"
            widget: "select"
            options:
              - { label: "Volledig (één afbeelding breed)", value: "volledig" }
              - { label: "Paar (twee naast elkaar)",        value: "paar" }
            default: "volledig"
          - label: "Afbeelding modus"
            name: "modus"
            widget: "select"
            options: ["afbeelding", "video"]
            default: "afbeelding"
          - label: "Afbeelding bestand"
            name: "bestand"
            widget: "file"
            hint: "Volledig: 1600 × 900 px (16:9) — Paar (links): 800 × 600 px (4:3) — max. 800 KB"
          - label: "Tweede afbeelding modus (alleen bij Paar)"
            name: "modus_2"
            widget: "select"
            options: ["afbeelding", "video"]
            default: "afbeelding"
          - label: "Tweede afbeelding bestand (alleen bij Paar)"
            name: "bestand_2"
            widget: "file"
            hint: "Alleen invullen bij layout Paar (rechts) — 800 × 600 px (4:3) — max. 800 KB"
      - { label: "Gepubliceerd", name: "gepubliceerd", widget: "boolean", default: true }
      - { label: "Volgorde",     name: "volgorde",     widget: "number",  default: 99 }

  # ── Homepage ────────────────────────────────────────────────────────────────
  - name: "home"
    label: "Homepage"
    files:
      - label: "Homepage inhoud"
        name: "home"
        file: "data/home.json"
        fields:
          - label: "Hero modus"
            name: "hero_modus"
            widget: "select"
            options: ["afbeelding", "video"]
            default: "video"
          - { label: "Hero bestand",       name: "hero_bestand",     widget: "file", hint: "Aanbevolen: 1920 × 1080 px (16:9) — max. 2 MB" }
          - { label: "Hero inhoud tonen",  name: "hero_content_zichtbaar", widget: "boolean", default: true }
          - label: "Hero uitlijning"
            name: "hero_uitlijning"
            widget: "select"
            options:
              - { label: "Gecentreerd", value: "midden" }
              - { label: "Links",       value: "links" }
              - { label: "Rechts",      value: "rechts" }
            default: "midden"
          - label: "Hero tekstblokken"
            name: "hero_blokken"
            widget: "list"
            fields:
              - label: "Teksttype"
                name: "tag"
                widget: "select"
                options:
                  - { label: "Grote koptitel (H1)", value: "h1" }
                  - { label: "Koptitel (H2)",       value: "h2" }
                  - { label: "Subtitel (H3)",        value: "h3" }
                  - { label: "Alineatekst",          value: "p" }
                default: "h1"
              - { label: "Tekst",     name: "tekst",     widget: "string" }
              - { label: "Zichtbaar", name: "zichtbaar", widget: "boolean", default: true }
          - label: "Hero knoppen"
            name: "hero_knoppen"
            widget: "list"
            fields:
              - { label: "Knoptekst", name: "tekst", widget: "string" }
              - { label: "Link",      name: "link",  widget: "string" }
              - label: "Stijl"
                name: "stijl"
                widget: "select"
                options:
                  - { label: "Primair (wit)",   value: "primair" }
                  - { label: "Secundair (zwart)", value: "secundair" }
                  - { label: "Outline",          value: "outline" }
                default: "primair"
              - { label: "Zichtbaar", name: "zichtbaar", widget: "boolean", default: true }
          - { label: "Intro titel",        name: "intro_titel",      widget: "string" }
          - { label: "Intro tekst 1",      name: "intro_tekst_1",    widget: "text" }
          - { label: "Intro tekst 2",      name: "intro_tekst_2",    widget: "text" }
          - { label: "Intro linktekst",    name: "intro_link_tekst", widget: "string" }
          - { label: "Disciplines sectietitel", name: "disciplines_titel", widget: "string", default: "Disciplines" }
          - label: "Disciplines"
            name: "disciplines"
            widget: "list"
            field: { label: "Discipline", name: "item", widget: "string" }

  # ── About ───────────────────────────────────────────────────────────────────
  - name: "about"
    label: "About"
    files:
      - label: "About inhoud"
        name: "about"
        file: "data/about.json"
        fields:
          - { label: "Opener zin",      name: "opener",        widget: "string" }
          - { label: "Naam",            name: "naam",          widget: "string" }
          - { label: "Bio alinea 1",    name: "bio_1",         widget: "text" }
          - { label: "Bio alinea 2",    name: "bio_2",         widget: "text" }
          - { label: "Bio alinea 3",    name: "bio_3",         widget: "text" }
          - { label: "Bio alinea 4",    name: "bio_4",         widget: "text" }
          - { label: "Bio alinea 5",    name: "bio_5",         widget: "text" }
          - { label: "Manifest quote",  name: "manifest_quote", widget: "text" }
          - { label: "CTA knoptekst",   name: "cta_knop",      widget: "string" }
          - label: "Portret modus"
            name: "portret_modus"
            widget: "select"
            options: ["afbeelding", "video"]
            default: "afbeelding"
          - { label: "Portret bestand", name: "portret_bestand", widget: "file", hint: "Aanbevolen: 800 × 1000 px (4:5) — max. 1 MB" }

  # ── Services ────────────────────────────────────────────────────────────────
  - name: "services"
    label: "Services"
    files:
      - label: "Services inhoud"
        name: "services"
        file: "data/services.json"
        fields:
          - { label: "Paginatitel",  name: "titel",      widget: "string" }
          - { label: "CTA titel",    name: "cta_titel",  widget: "string" }
          - { label: "CTA subtekst", name: "cta_sub",    widget: "text" }
          - { label: "CTA knop",     name: "cta_knop",   widget: "string" }
          - label: "Diensten"
            name: "diensten"
            widget: "list"
            fields:
              - { label: "Naam",         name: "naam",         widget: "string" }
              - { label: "Omschrijving", name: "omschrijving", widget: "text" }
              - label: "Beeld modus"
                name: "beeld_modus"
                widget: "select"
                options: ["afbeelding", "video"]
                default: "afbeelding"
              - { label: "Beeld bestand", name: "beeld_bestand", widget: "file", hint: "Aanbevolen: 1200 × 900 px (4:3) — max. 1 MB" }

  # ── Contact ─────────────────────────────────────────────────────────────────
  - name: "contact"
    label: "Contact"
    files:
      - label: "Contact inhoud"
        name: "contact"
        file: "data/contact.json"
        fields:
          - { label: "Titel",          name: "titel",        widget: "string" }
          - { label: "Subtekst",       name: "subtekst",     widget: "text" }
          - { label: "Direct titel",   name: "direct_titel", widget: "string" }
          - { label: "Direct tekst",   name: "direct_tekst", widget: "text" }
          - { label: "E-mailadres",    name: "email",        widget: "string" }
          - { label: "Knoptekst",      name: "submit_tekst", widget: "string" }

  # ── Globaal ─────────────────────────────────────────────────────────────────
  - name: "globaal"
    label: "Globaal"
    files:
      - label: "Globale instellingen"
        name: "globaal"
        file: "data/globaal.json"
        fields:
          - { label: "Logo tekst",                         name: "logo",                widget: "string" }
          - { label: "Logo wit (op donkere achtergrond)", name: "logo_wit_bestand",    widget: "file", hint: "SVG aanbevolen, of PNG transparant — max. 200 KB" }
          - { label: "Logo zwart (op witte achtergrond)", name: "logo_zwart_bestand",  widget: "file", hint: "SVG aanbevolen, of PNG transparant — max. 200 KB" }
          - { label: "Footer tagline",     name: "footer_tagline",    widget: "text" }
          - { label: "Footer e-mail",      name: "footer_email",      widget: "string" }
          - { label: "Footer locatie",     name: "footer_locatie",    widget: "string" }
          - { label: "Copyright tekst",    name: "copyright",         widget: "string" }
          - { label: "Footer credit",      name: "footer_credit",     widget: "string" }
          - { label: "Sociale link — Instagram", name: "social_instagram", widget: "string" }
          - { label: "Sociale link — LinkedIn",  name: "social_linkedin",  widget: "string" }
          - { label: "Sociale link — Behance",   name: "social_behance",   widget: "string" }
          - label: "Case labels (filteropties)"
            name: "case_labels"
            widget: "list"
            field: { label: "Label", name: "label", widget: "string" }
            hint: "Volgorde bepaalt de volgorde van de filterknoppen. Gebruik exact dezelfde namen op de cases zelf."
